name: Docs site

# Publishes docs/site/ (designed static HTML) plus the docs/*.md sources
# served raw under /md/ to GitHub Pages whenever anything under docs/
# changes on main. Static site; no build step.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Assemble site
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Assemble public/
        run: |
          set -euo pipefail
          mkdir -p public
          if [ -d docs/site ]; then
            cp -r docs/site/. public/
          fi
          mkdir -p public/md
          shopt -s nullglob
          for f in docs/*.md; do
            cp "$f" public/md/
          done
          # Nojekyll so GitHub Pages serves files starting with underscores.
          touch public/.nojekyll
          ls -la public/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
