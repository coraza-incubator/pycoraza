name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-libcoraza:
    name: Build libcoraza (manylinux_2_28)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Build inside the same manylinux image cibuildwheel will consume at
    # release time. Keeps the symbol-version surface (notably getrandom)
    # identical between CI's integration tests and shipped wheels.
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Cache built libcoraza
        id: libcoraza-cache
        uses: actions/cache@v4
        with:
          path: build/libcoraza
          key: libcoraza-${{ runner.os }}-x86_64-${{ hashFiles('native/version.txt', 'native/coraza_cdef.h', 'native/scripts/build-libcoraza.sh') }}
          restore-keys: ''

      - name: Build libcoraza
        if: steps.libcoraza-cache.outputs.cache-hit != 'true'
        env:
          LIBCORAZA_PREFIX: ${{ github.workspace }}/build/libcoraza
        run: bash native/scripts/build-libcoraza.sh

      - name: Upload libcoraza artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcoraza-x86_64
          path: build/libcoraza/
          retention-days: 7
          if-no-files-found: error

  test:
    name: Test . Python ${{ matrix.python }}
    runs-on: ubuntu-latest
    needs: build-libcoraza
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/download-artifact@v4
        with:
          name: libcoraza-x86_64
          path: build/libcoraza

      - name: Make libcoraza executables discoverable
        run: |
          set -euo pipefail
          if [ -d build/libcoraza/lib ]; then
            echo "LD_LIBRARY_PATH=${GITHUB_WORKSPACE}/build/libcoraza/lib:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          fi
          echo "LIBCORAZA_PREFIX=${GITHUB_WORKSPACE}/build/libcoraza" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install project (editable, dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" --config-settings editable_mode=compat

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy

      - name: Fetch OWASP CRS rules
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091
          source native/version.txt
          TMP=$(mktemp -d)
          curl -fsSL "https://github.com/coreruleset/coreruleset/archive/refs/tags/${CRS_TAG}.tar.gz" \
            | tar -C "$TMP" -xzf -
          SRC="$TMP/coreruleset-${CRS_TAG#v}"
          DEST=src/pycoraza/coreruleset/rules
          mkdir -p "$DEST"
          cp -r "$SRC/rules" "$DEST/rules"
          cp "$SRC/crs-setup.conf.example" "$DEST/crs-setup.conf.example"
          echo "${CRS_TAG}" > "$DEST/.crs-tag"

      - name: Unit + integration tests with coverage
        run: pytest --cov --cov-report=xml --cov-fail-under=90 --ignore=tests/e2e tests/

      - name: E2E tests (real libcoraza, real HTTP)
        run: pytest tests/e2e -v --no-cov

      - name: Upload coverage to Codecov
        if: matrix.python == '3.12'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
          files: ./coverage.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-wheels-smoke:
    name: Build wheel smoke (cp312 linux x86_64)
    runs-on: ubuntu-latest
    # Pre-release sanity check. Full cibuildwheel matrix runs on tag in
    # release.yml. Skipped for PRs to keep PR feedback fast.
    #
    # Currently OPT-IN via workflow_dispatch. Enabling on every push-to-main
    # blocks CI on cibuildwheel's image-resolution / Go-in-manylinux path,
    # which is known-fragile while we stabilize the native build contract.
    # Re-enable the `push`/main condition once release.yml green.
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel

      - name: Build cp312 wheel (linux x86_64 only)
        env:
          CIBW_BUILD: cp312-manylinux_x86_64
          CIBW_ARCHS_LINUX: x86_64
        run: python -m cibuildwheel --platform linux --output-dir wheelhouse

      - name: Import smoke test in fresh venv
        run: |
          set -euo pipefail
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install --upgrade pip
          /tmp/smoke/bin/pip install wheelhouse/pycoraza-*-cp312-*manylinux*_x86_64.whl
          /tmp/smoke/bin/python -c "import pycoraza; print('import ok:', pycoraza.__name__)"

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-smoke-cp312
          path: wheelhouse/*.whl
          retention-days: 7
